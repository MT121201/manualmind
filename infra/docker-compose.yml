#version: '3.8'

services:
  # 1. MinIO: PDF saver
  minio:
    image: minio/minio:latest
    container_name: manualmind-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "admin"
      MINIO_ROOT_PASSWORD: "password123"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # 2. MongoDB: metadata
  mongodb:
    image: mongo:6.0
    container_name: manualmind-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # 3. Redis: Cache for API
  redis:
    image: redis:7-alpine
    container_name: manualmind-redis
    ports:
      - "6379:6379"

  # 4. RabbitMQ: Message Broker for Celery (Task Queue)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: manualmind-rabbitmq
    ports:
      - "5672:5672"   # Port giao tiếp
      - "15672:15672" # Giao diện quản lý web
    environment:
      RABBITMQ_DEFAULT_USER: "guest"
      RABBITMQ_DEFAULT_PASS: "guest"

  # 5. Qdrant: Vector Database for RAG
  qdrant:
    image: qdrant/qdrant:latest
    container_name: manualmind-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  minio_data:
  mongo_data:
  qdrant_data: